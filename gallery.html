    <button class="suku-lightbox-arrow suku-lightbox-prev" aria-label="Previous image">&#10094;</button>
    <img class="suku-lightbox-image" src="" alt="">
    <button class="suku-lightbox-arrow suku-lightbox-next" aria-label="Next image">&#10095;</button>
  </div>

  <script type="module">
    function playAndNavigate(url) {
    const audio = document.getElementById('menuClickAudio');
    audio.currentTime = 0;
    audio.play();
    setTimeout(() => {
        window.location.href = url;
    }, 180);
    }

    document.querySelector('.option-container').onclick = function(e) {
    e.stopPropagation();
    playAndNavigate('gallery.html');
    };

    document.querySelector('.option-container-2').onclick = function(e) {
        e.stopPropagation();
        playAndNavigate('films.html');
    };

    document.querySelectorAll('.triangle-container').forEach((container, index) => {
    container.onclick = function(e) {
        e.stopPropagation();
        if (index === 0) {
            playAndNavigate('about.html');
        } else {
            playAndNavigate('contact.html');
        }
    };
    });

    document.querySelector('.title-container').onclick = function(e) {
    e.stopPropagation();
    playAndNavigate('index.html');
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import { getFirestore, doc, setDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPHalnYFfFkCJspSeWNytSngnpEWC9lNk",
        authDomain: "nyamachoma-57d58.firebaseapp.com",
        projectId: "nyamachoma-57d58",
        storageBucket: "nyamachoma-57d58.firebasestorage.app",
        messagingSenderId: "1090224589648",
        appId: "1:1090224589648:web:c8a08e362ea132a7e6ba55",
        measurementId: "G-N7DGBF6Q79"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const menuClickAudio = document.getElementById('menuClickAudio');

    function playMenuClick() {
      if (!menuClickAudio) return;
      try {
        menuClickAudio.currentTime = 0;
        menuClickAudio.play();
      } catch (e) {
        // ignore autoplay errors
      }
    }

    (async function trackPageView() {
        const pagePath = window.location.pathname || '/';
        const pageKey  = pagePath.replace(/\//g, '__');

        try {
        await setDoc(
            doc(db, 'pageViews', pageKey),
            {
            path: pagePath,
            count: increment(1),
            updatedAt: serverTimestamp(),
            referrer: document.referrer || null,
            ua: navigator.userAgent
            },
            { merge: true }
        );
        } catch (e) {
        console.warn('page view log failed:', e);
        }
    })();
    /* ========= LIGHTBOX LOGIC ========= */
    const lightbox      = document.getElementById('userLightbox');
    const lightboxImg   = lightbox.querySelector('.suku-lightbox-image');
    const prevBtn       = lightbox.querySelector('.suku-lightbox-prev');
    const nextBtn       = lightbox.querySelector('.suku-lightbox-next');
    const columnEls = Array.from(document.querySelectorAll('.image-column'));
    const columnLinks = columnEls.map(col =>
    Array.from(col.querySelectorAll('.image-link'))
    );

    const maxRows = Math.max(...columnLinks.map(col => col.length));

    const imageLinks = [];
    for (let row = 0; row < maxRows; row++) {
    for (let c = 0; c < columnLinks.length; c++) {
        const link = columnLinks[c][row];
        if (link) imageLinks.push(link);
    }
    }

    let currentIndex = -1;

    function showImage(index) {
      if (!imageLinks.length) return;

      // wrap-around
      if (index < 0) {
        index = imageLinks.length - 1;
      } else if (index >= imageLinks.length) {
        index = 0;
      }

      currentIndex = index;
      const linkEl = imageLinks[currentIndex];
      const imgEl  = linkEl.querySelector('img');

      // Use full-size href if present, fallback to img src
      const src = linkEl.getAttribute('href') || imgEl.src;
      lightboxImg.src = src;
      lightboxImg.alt = imgEl.alt || '';
    }

    function openLightbox(index) {
      showImage(index);
      lightbox.classList.add('suku-lightbox-open');
    }

    function closeLightbox() {
      lightbox.classList.remove('suku-lightbox-open');
      lightboxImg.src = '';
      lightboxImg.alt = '';
    }

    function showNext(delta) {
      if (currentIndex === -1) return;
      showImage(currentIndex + delta);
    }

    // Intercept clicks on gallery images
    imageLinks.forEach((link, index) => {
      link.addEventListener('click', (e) => {
        e.preventDefault();       // stop opening a new tab
        e.stopPropagation();
        playMenuClick();
        openLightbox(index);
      });
    });

    // Prev / Next buttons
    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      playMenuClick();
      showNext(-1);
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      playMenuClick();
      showNext(1);
    });

    // Click outside image to close
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        playMenuClick();
        closeLightbox();
      }
    });

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('suku-lightbox-open')) return;

      if (e.key === 'Escape') {
        playMenuClick();
        closeLightbox();
      } else if (e.key === 'ArrowRight') {
        playMenuClick();
        showNext(1);
      } else if (e.key === 'ArrowLeft') {
        playMenuClick();
        showNext(-1);
      }
    });
  </script>
